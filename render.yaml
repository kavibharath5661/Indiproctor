services:
  # Backend Web Service (Docker)
  - type: web
    name: indiproctor-backend
    env: docker
    region: ohio
    plan: free # Note: If OOM crashes occur during models loading, upgrade to starter ($7/mo)
    rootDir: backend
    dockerCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /
    autoDeploy: false

  # Frontend Static Site
  - type: web
    name: indiproctor-frontend
    env: static
    region: ohio
    rootDir: frontend
    buildCommand: "" # No build required for static HTML/JS
    staticPublishPath: . # Publish the root of the frontend folder
    autoDeploy: false
